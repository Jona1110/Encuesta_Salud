<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estadísticas Completas - Salud Ambiental</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #9b89cf;
            --primary-dark: #7a69ad;
            --bg-page: #f9f8ff;
            --white: #ffffff;
            --text-dark: #2d2a35;
            --shadow: 0 10px 30px rgba(155, 137, 207, 0.12);
        }

        body {
            background: var(--bg-page);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding: 40px 20px;
            color: var(--text-dark);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        h1 { font-size: 2.5rem; margin-bottom: 10px; color: var(--primary-dark); }
        .subtitle { color: #8a8594; font-size: 1.1rem; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        .card {
            background: var(--white);
            padding: 25px;
            border-radius: 24px;
            box-shadow: var(--shadow);
            border: 1px solid #f0f0f7;
            display: flex;
            flex-direction: column;
        }

        .card h3 {
            margin-top: 0;
            font-size: 1rem;
            color: var(--text-dark);
            margin-bottom: 20px;
            min-height: 3em;
            line-height: 1.4;
        }

        .summary-cards {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .summary-item {
            flex: 1;
            background: var(--primary);
            color: white;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
        }

        .summary-item span { display: block; font-size: 0.9rem; opacity: 0.9; }
        .summary-item strong { font-size: 2rem; }

        #loading {
            text-align: center;
            padding: 100px;
            font-size: 1.5rem;
            color: var(--primary);
        }

        .chart-container {
            position: relative;
            flex-grow: 1;
            min-height: 250px;
        }

        @media (max-width: 600px) {
            .stats-grid { grid-template-columns: 1fr; }
            .summary-cards { flex-direction: column; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Panel de Control Ambiental</h1>
            <p class="subtitle">Análisis estadístico detallado de las 16 variables del diagnóstico</p>
        </header>

        <div id="loading">📊 Analizando respuestas...</div>

        <div id="content" style="display: none;">
            <div class="summary-cards">
                <div class="summary-item">
                    <span>Muestra Total</span>
                    <strong id="totalCount">0</strong>
                </div>
                <div class="summary-item" style="background: #7a69ad;">
                    <span>Estado del Sistema</span>
                    <strong style="font-size: 1.2rem; margin-top: 10px;">En Línea</strong>
                </div>
            </div>

            <div class="stats-grid" id="chartsContainer">
                <!-- Se generan 16 gráficas automáticamente -->
            </div>
        </div>
    </div>

    <script>
const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbwbNpXe-E24pvwnS7Ro-YHcEbk5NvJqwuxlefBknOjubty3hc8Lt1NszTl9fRsaVj-O/exec";
        

        // Definición de las preguntas para mapear títulos y tipos
        const preguntas = [
            { id: 1, texto: "¿Acumulación de basura en calles?", tipo: "radio" },
            { id: 2, texto: "¿Frecuencia del camión recolector?", tipo: "radio" },
            { id: 3, texto: "¿Limpieza del parque comunitario?", tipo: "radio" },
            { id: 4, texto: "¿Uso de agua del venero?", tipo: "radio" },
            { id: 5, texto: "¿Agua del venero contaminada?", tipo: "radio" },
            { id: 6, texto: "Escala de estado del venero (1-5)", tipo: "range" },
            { id: 7, texto: "Cambios notados en el agua", tipo: "checkbox" },
            { id: 8, texto: "Causa de la contaminación", tipo: "select" },
            { id: 9, texto: "Afectación de la basura en salud", tipo: "checkbox" },
            { id: 10, texto: "¿Repercusión en grupos vulnerables?", tipo: "radio" },
            { id: 11, texto: "¿Aparición de mosquitos (vectores)?", tipo: "radio" },
            { id: 12, texto: "Riesgos asociados al agua", tipo: "checkbox" },
            { id: 13, texto: "¿Anomalías físicas en el agua?", tipo: "radio" },
            { id: 14, texto: "¿Daños por uso de agua contaminada?", tipo: "radio" },
            { id: 15, texto: "¿Conciencia riesgo Dengue/Zika?", tipo: "radio" },
            { id: 16, texto: "Beneficios de mantener limpio", tipo: "checkbox" }
        ];

        const colores = [
            '#9b89cf', '#7a69ad', '#b39ddb', '#eaddff', '#d1c4e9', 
            '#5e35b1', '#4527a0', '#311b92', '#b388ff', '#7c4dff'
        ];

        async function cargarDatos() {
            try {
                const response = await fetch(URL_SCRIPT);
                const data = await response.json();
                
                if (!data || data.length === 0) {
                    document.getElementById('loading').innerText = "No hay datos suficientes para mostrar estadísticas.";
                    return;
                }

                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';
                document.getElementById('totalCount').innerText = data.length;

                generarTablero(data);
            } catch (error) {
                console.error(error);
                document.getElementById('loading').innerHTML = "Error al obtener datos.<br><small>Asegúrate de haber implementado la función doGet en Apps Script.</small>";
            }
        }

        function generarTablero(data) {
            const container = document.getElementById('chartsContainer');
            
            preguntas.forEach(p => {
                // 1. Crear la Tarjeta
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <h3>${p.id}. ${p.texto}</h3>
                    <div class="chart-container">
                        <canvas id="chart${p.id}"></canvas>
                    </div>
                `;
                container.appendChild(card);

                // 2. Procesar Datos de la pregunta
                const frecuencias = {};
                
                data.forEach(fila => {
                    let respuesta = fila['q' + p.id];
                    
                    if (respuesta !== undefined && respuesta !== "") {
                        // Si es checkbox, la respuesta viene como "Opción A, Opción B"
                        if (p.tipo === "checkbox" && typeof respuesta === "string") {
                            const opciones = respuesta.split(',').map(s => s.trim());
                            opciones.forEach(opt => {
                                frecuencias[opt] = (frecuencias[opt] || 0) + 1;
                            });
                        } else {
                            // Radio, Select o Range
                            frecuencias[respuesta] = (frecuencias[respuesta] || 0) + 1;
                        }
                    }
                });

                // 3. Configurar Tipo de Gráfica
                // Usamos Bar para checkboxes y range (mejor lectura), Doughnut para el resto
                const tipoGrafica = (p.tipo === 'checkbox' || p.tipo === 'range') ? 'bar' : 'doughnut';

                const ctx = document.getElementById(`chart${p.id}`).getContext('2d');
                new Chart(ctx, {
                    type: tipoGrafica,
                    data: {
                        labels: Object.keys(frecuencias),
                        datasets: [{
                            label: 'Votos',
                            data: Object.values(frecuencias),
                            backgroundColor: colores,
                            borderWidth: 1,
                            borderRadius: 8
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                display: tipoGrafica === 'doughnut',
                                position: 'bottom',
                                labels: { boxWidth: 12, font: { size: 11 } }
                            }
                        },
                        scales: tipoGrafica === 'bar' ? {
                            y: { beginAtZero: true, grid: { display: false } },
                            x: { grid: { display: false } }
                        } : {}
                    }
                });
            });
        }

        window.onload = cargarDatos;
    </script>
</body>
</html>
