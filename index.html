<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encuesta de Salud Ambiental</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="progress-container">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="survey-container">
        <header class="main-header">
            <!-- Escudo Izquierdo -->
            <img src="Logo_Fray.jpeg" alt="Escudo Izquierdo" class="escudo-img">
            
            <div class="header-text">
                <div class="badge">Salud Comunitaria</div>
                <h1>Diagnóstico Ambiental</h1>
                <p>Tu opinión es fundamental para generar un cambio en nuestra comunidad.</p>
            </div>

            <!-- Escudo Derecho -->
            <img src="Logo_Centro.png" alt="Escudo Derecho" class="escudo-img">
        </header>
        
        <form id="pollForm">
            <div id="questions-area"></div>
            
            <div class="footer-actions">
                <button type="submit" id="submitBtn">Finalizar y Enviar</button>
            </div>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
