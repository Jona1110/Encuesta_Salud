<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encuesta de Salud Ambiental</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Iconos para el candado -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="progress-container">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <!-- Botón de Acceso Admin (Candado) -->
    <button id="adminBtn" class="admin-access-btn" title="Acceso Estadísticas">
        <i class="fas fa-lock"></i>
    </button>

    <!-- Modal de Login para Estadísticas -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <h3>Acceso Restringido</h3>
            <p>Ingresa las credenciales para ver estadísticas del diagnóstico.</p>
            <input type="text" id="adminUser" placeholder="Usuario">
            <input type="password" id="adminPass" placeholder="Contraseña">
            <div class="modal-actions">
                <button type="button" id="closeModal" class="btn-secondary">Cancelar</button>
                <button type="button" id="loginSubmit" class="btn-primary">Entrar</button>
            </div>
        </div>
    </div>
    
<div class="survey-container">
        <header class="main-header">
            <!-- Logo Izquierdo -->
            <img src="Logo_Fray.jpeg" alt="Escudo Izquierdo" class="escudo-img">
            
            <!-- Texto Central -->
            <div class="header-text">
                <div class="badge">Salud Comunitaria</div>
                <h1>Diagnóstico Ambiental</h1>
                <p>Tu opinión es fundamental para generar un cambio en nuestra comunidad.</p>
            </div>

            <!-- Logo Derecho -->
            <img src="Logo_Centro.png" alt="Escudo Derecho" class="escudo-img">
        </header>
        
        <form id="pollForm">
            <div id="questions-area"></div>
            
            <div class="footer-actions">
                <button type="submit" id="submitBtn">Finalizar y Enviar</button>
            </div>
        </form>
    </div>

    <script src="script.js"></script>
</body>

</html>
